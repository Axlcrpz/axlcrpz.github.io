<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- SEO / Social -->
  <title>Axcel Corpuz — Web Developer & Data Analyst</title>
  <meta name="description"
    content="Portfolio of Axcel Jhaze M. Corpuz — Web Developer & Data Analyst. Creating technology-driven solutions through data and analytics." />
  <meta name="author" content="Axcel Jhaze M. Corpuz" />
  <meta property="og:title" content="Axcel Corpuz — Web Developer & Data Analyst" />
  <meta property="og:description" content="Creating technology-driven solutions through data and analytics." />
  <meta property="og:type" content="website" />

  <!-- Theme color flash guard: set theme before paint -->
  <script>
    (function () {
      try {
        var saved = localStorage.getItem('theme');
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersLight ? 'light' : 'dark'));
      } catch (e) { /* no-op */ }
    })();
  </script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Styles (single entry; imports modular partials) -->
  <link rel="stylesheet" href="./css/main.css" />
</head>

<body>
  <!-- Skip link for accessibility -->
  <a class="skip-link" href="#main">Skip to content</a>

  <!-- Top read-progress bar (driven by js/utils/scroll.js) -->
  <div class="scroll-progress" id="scrollProgress" aria-hidden="true"></div>

  <!-- Navbar (rendered by js/components/navbar.js) -->
  <header id="navbar" class="navbar"></header>

  <main id="main">
    <!-- Each section is a mount point; markup is injected by its renderer -->
    <section id="hero" class="section section--hero"></section>
    <section id="about" class="section" aria-label="About"></section>
    <section id="focus" class="section section--alt" aria-label="What I do"></section>
    <section id="skills" class="section" aria-label="Skills"></section>
    <section id="projects" class="section section--alt" aria-label="Projects"></section>
    <section id="education" class="section" aria-label="Education"></section>
    <section id="contact" class="section section--alt" aria-label="Contact"></section>
  </main>

  <!-- Footer (rendered by main.js) -->
  <footer id="footer" class="footer"></footer>

  <!-- App entry (ES module: requires a local server — see README) -->
  <script type="module" src="./js/main.js"></script>
</body>
</html>
